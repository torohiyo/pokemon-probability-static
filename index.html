<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>ポケカ確率計算</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="logo">%</div>
        <div>
          <p class="eyebrow">Pokémon Card Probability</p>
          <h1>山札ドロー確率計算</h1>
          <p>初期の山札・手札を入れて、カード画像をタップ。リーリエ→さかてにとる等の連続成功率を計算します。</p>
        </div>
      </header>

      <section class="card result-card top-result">
        <div>
          <p class="eyebrow">Total Probability</p>
          <h2>全体成功率</h2>
        </div>
        <strong id="totalProbTop">—</strong>
        <p id="resultSummaryTop">カード効果を追加してください。</p>
      </section>

      <section class="card">
        <h2>初期状態</h2>
        <div class="grid two">
          <label class="field"><span>山札枚数</span><input id="deck" type="number" inputmode="numeric" min="1" max="60" value="47" /></label>
          <label class="field"><span>手札枚数</span><input id="hand" type="number" inputmode="numeric" min="0" max="20" value="5" /></label>
        </div>
      </section>

      <section class="card effect-picker">
        <div class="section-head">
          <div>
            <p class="eyebrow">Card Effects</p>
            <h2>カード効果を追加</h2>
          </div>
          <p>画像をタップすると、下のシナリオに追加されます。</p>
        </div>
        <div id="effectRail" class="effect-rail"></div>
      </section>

      <section class="scenario-head">
        <div>
          <p class="eyebrow">Scenario</p>
          <h2>シナリオ</h2>
        </div>
        <div class="scenario-actions">
          <button id="addStep" class="add-button">＋ カスタム</button>
          <button id="clearSteps" class="add-button subtle">クリア</button>
        </div>
      </section>

      <div id="steps"></div>

      <section class="card result-card bottom-result">
        <div>
          <p class="eyebrow">Result</p>
          <h2>計算結果</h2>
        </div>
        <strong id="totalProb">—</strong>
        <p id="resultSummary">カード効果を追加してください。</p>
        <div id="timeline" class="timeline"></div>
      </section>

      <footer>
        <p>※ 簡易計算です。各ステップの「山に残っている枚数」は、その効果を使う時点での想定枚数として入力してください。</p>
      </footer>
    </main>
    <script src="./assets/app.js"></script>
  </body>
</html>
