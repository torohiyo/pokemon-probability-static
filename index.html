<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>ポケカ確率計算</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="logo">%</div>
        <div>
          <p class="eyebrow">Pokémon Card Probability</p>
          <h1>山札ドロー確率計算</h1>
          <p>縦引き、混ぜ直し、条件付き確率、OR条件をスマホで確認できます。</p>
        </div>
      </header>

      <section class="card">
        <h2>初期状態</h2>
        <div class="grid two">
          <label class="field"><span>山札枚数</span><input id="deck" type="number" inputmode="numeric" min="1" max="60" value="47" /></label>
          <label class="field"><span>単発計算で引く枚数</span><input id="simpleDraw" type="number" inputmode="numeric" min="1" max="30" value="3" /></label>
        </div>
        <div class="grid three">
          <label class="field"><span>対象Aの残り枚数</span><input id="copyA" type="number" inputmode="numeric" min="0" max="60" value="3" /></label>
          <label class="field"><span>対象Bの残り枚数</span><input id="copyB" type="number" inputmode="numeric" min="0" max="60" value="2" /></label>
          <label class="field"><span>対象Cの残り枚数</span><input id="copyC" type="number" inputmode="numeric" min="0" max="60" value="5" /></label>
        </div>
      </section>

      <section class="card result-card">
        <h2>単発ドロー</h2>
        <div class="result-grid">
          <div><span>Aを1枚以上</span><strong id="simpleA">—</strong></div>
          <div><span>Bを1枚以上</span><strong id="simpleB">—</strong></div>
          <div><span>Cを1枚以上</span><strong id="simpleC">—</strong></div>
          <div><span>A/B/Cいずれか</span><strong id="simpleAny">—</strong></div>
        </div>
      </section>

      <section class="scenario-head">
        <div>
          <p class="eyebrow">Conditional Scenario</p>
          <h2>条件付きシナリオ</h2>
        </div>
        <button id="addStep" class="add-button">＋ ステップ追加</button>
      </section>

      <div id="steps"></div>

      <section class="card sticky-result">
        <h2>計算結果</h2>
        <div class="total-prob">
          <span>全ステップを順番に満たす確率</span>
          <strong id="totalProb">—</strong>
        </div>
        <div id="timeline" class="timeline"></div>
      </section>

      <footer>
        <p>例：「3枚引いてAを引いた後、そのAで追加ドローしてBまたはCを探す」場合は、STEP1をA、STEP2をB/CのOR条件にしてください。</p>
      </footer>
    </main>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
