<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <title>ポケカ確率計算</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero compact">
        <div class="logo">%</div>
        <div>
          <p class="eyebrow">Pokémon Card Probability</p>
          <h1>山札ドロー確率計算</h1>
          <p>カード画像を順番にタップして、連続プレイ後に目的カードを引ける確率を計算します。</p>
        </div>
      </header>

      <section class="result-card top-result">
        <div>
          <p class="eyebrow">Total</p>
          <strong id="totalProbTop">—</strong>
        </div>
        <p id="resultSummaryTop">カード効果を追加してください。</p>
      </section>

      <section class="card compact-card">
        <div class="section-title-row">
          <h2>初期状態</h2>
          <p>最初の山札・手札</p>
        </div>
        <div class="grid two">
          <label class="field"><span>山札</span><input id="deck" type="number" inputmode="numeric" min="1" max="60" value="47" /></label>
          <label class="field"><span>手札</span><input id="hand" type="number" inputmode="numeric" min="0" max="20" value="5" /></label>
        </div>
      </section>

      <section class="card compact-card">
        <div class="section-title-row">
          <h2>引きたいカード</h2>
          <p>山札に残っている枚数</p>
        </div>
        <div class="target-grid">
          <label class="field mini"><span>A</span><input id="targetA" type="number" inputmode="numeric" min="0" max="60" value="1" /></label>
          <label class="field mini"><span>B</span><input id="targetB" type="number" inputmode="numeric" min="0" max="60" value="0" /></label>
          <label class="field mini"><span>C</span><input id="targetC" type="number" inputmode="numeric" min="0" max="60" value="0" /></label>
        </div>
        <details class="details global-details">
          <summary>詳細条件</summary>
          <div class="details-body">
            <div class="condition-tabs">
              <button class="pill-button active" data-global-condition="any">どれか1種</button>
              <button class="pill-button" data-global-condition="all">すべて</button>
              <button class="pill-button" data-global-condition="atLeast">合計n枚以上</button>
            </div>
            <div id="minGrid" class="min-grid hidden">
              <button class="min-button active" data-min="1">1</button>
              <button class="min-button" data-min="2">2</button>
              <button class="min-button" data-min="3">3</button>
              <button class="min-button" data-min="4">4</button>
              <button class="min-button" data-min="5">5</button>
              <button class="min-button" data-min="6">6</button>
              <button class="min-button" data-min="7">7</button>
              <button class="min-button" data-min="8">8</button>
            </div>
            <p id="conditionText" class="hint"></p>
          </div>
        </details>
      </section>

      <section class="card compact-card effect-picker">
        <div class="section-title-row">
          <h2>カード効果</h2>
          <p>左から順にタップ</p>
        </div>
        <div id="effectRail" class="effect-rail"></div>
      </section>

      <section class="scenario-block">
        <div class="section-title-row scenario-title">
          <h2>プレイ順</h2>
          <button id="clearSteps" class="clear-button">クリア</button>
        </div>
        <div id="steps" class="steps-strip"></div>
      </section>

      <section class="result-card bottom-result">
        <div class="section-title-row">
          <h2>計算結果</h2>
          <strong id="totalProb">—</strong>
        </div>
        <p id="resultSummary">カード効果を追加してください。</p>
        <div id="timeline" class="timeline"></div>
      </section>

      <footer>
        <p>※ 山札圧縮は「目的カード以外を減らす」前提で計算します。手札を戻す効果は、直前までに引いた目的カードが手札にある場合も状態として反映します。</p>
      </footer>
    </main>
    <script src="./assets/app.js"></script>
  </body>
</html>
